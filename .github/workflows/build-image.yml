name: Build FS25 Pterodactyl image

on:
  push:
    branches:
      - main
    paths-ignore:
      - egg-farming-simulator-25.json
      - README.md
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: fs25-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repository="${GITHUB_REPOSITORY#*/}"
          repository="${repository,,}"
          image="ghcr.io/${owner}/${repository}"
          echo "name=${image}" >> "$GITHUB_OUTPUT"
          echo "latest=${image}:latest" >> "$GITHUB_OUTPUT"

      - name: Generate importable egg JSON
        env:
          GHCR_IMAGE: ${{ steps.image.outputs.latest }}
        run: |
          python3 scripts/render-egg.py \
            egg/egg-farming-simulator-25.template.json \
            egg-farming-simulator-25.json \
            "$GHCR_IMAGE"
          python3 -m json.tool egg-farming-simulator-25.json >/dev/null

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=FS25 Pterodactyl
            org.opencontainers.image.description=Farming Simulator 25 Wine and noVNC image for Pterodactyl
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          file: ./docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Commit generated egg JSON
        shell: bash
        run: |
          if git diff --quiet -- egg-farming-simulator-25.json; then
            echo "Egg JSON already points to the correct image."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add egg-farming-simulator-25.json
          git commit -m "Update generated egg image [skip ci]"
          git push
